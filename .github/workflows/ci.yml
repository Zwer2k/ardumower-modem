name: CI

on:
  push:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Package UI into asset_bundle.h
        working-directory: util/package_ui
        run: go run .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Build ESP32 firmware
        run: pio run -e esp32

      - name: Build ESP32-S3 firmware
        run: pio run -e esp32-S3-N16-R8

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/esp32 artifacts/esp32-s3
          
          # ESP32
          src=".pio/build/esp32"
          dst="artifacts/esp32"
          cp -v "$src/firmware.bin" "$dst/" 2>/dev/null || true
          cp -v "$src/firmware.elf" "$dst/" 2>/dev/null || true
          cp -v "$src/partitions.bin" "$dst/" 2>/dev/null || true
          cp -v "$src/bootloader.bin" "$dst/" 2>/dev/null || true
          
          # ESP32-S3
          src=".pio/build/esp32-S3-N16-R8"
          dst="artifacts/esp32-s3"
          cp -v "$src/firmware.bin" "$dst/" 2>/dev/null || true
          cp -v "$src/firmware.elf" "$dst/" 2>/dev/null || true
          cp -v "$src/partitions.bin" "$dst/" 2>/dev/null || true
          cp -v "$src/bootloader.bin" "$dst/" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: artifacts/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/esp32/*
            artifacts/esp32-s3/*
          generate_release_notes: true

  nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: firmware
          path: artifacts

      - name: Get date and commit hash
        id: version
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "short_hash=$(git log -1 --format=%h)" >> "$GITHUB_OUTPUT"

      - name: Create/Update Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly ${{ steps.version.outputs.date }} (${{ steps.version.outputs.short_hash }})
          body: |
            Nightly build from ${{ steps.version.outputs.date }} (commit ${{ steps.version.outputs.short_hash }}).

            **Firmware files:**
            - `esp32/firmware.bin` – for ESP32 (Wemos D1 mini)
            - `esp32-s3/firmware.bin` – for ESP32-S3 (16MB OPI PSRAM)

            Diese Version wird mit jedem neuen Nightly-Build überschrieben.
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            artifacts/esp32/*.bin
            artifacts/esp32/*.elf
            artifacts/esp32-s3/*.bin
            artifacts/esp32-s3/*.elf

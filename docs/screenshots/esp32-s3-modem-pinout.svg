<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" font-family="Consolas, monospace" font-size="11">
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a5c2a"/>
      <stop offset="100%" stop-color="#1e7a1e"/>
    </linearGradient>
    <linearGradient id="usb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
  </defs>

  <!-- Board outline -->
  <rect x="80" y="30" width="760" height="590" rx="8" fill="url(#board)" stroke="#0a3a0a" stroke-width="3"/>
  <rect x="95" y="45" width="730" height="560" rx="5" fill="none" stroke="#3a8a3a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ESP32-S3 Module area -->
  <rect x="320" y="100" width="280" height="160" rx="4" fill="#1a4a1a" stroke="#3a8a3a" stroke-width="1"/>
  <text x="460" y="155" text-anchor="middle" fill="#8c8" font-size="14" font-weight="bold">ESP32-S3-WROOM-1</text>
  <text x="460" y="185" text-anchor="middle" fill="#6a6" font-size="10">240 MHz · 16 MB Flash · 8 MB PSRAM</text>
  <text x="460" y="205" text-anchor="middle" fill="#6a6" font-size="10">WiFi + BLE 5.0 · USB OTG</text>

  <!-- J1 header (left) -->
  <rect x="40" y="50" width="36" height="520" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="58" y="45" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">J1</text>

  <!-- J3 header (right) -->
  <rect x="844" y="50" width="36" height="520" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="862" y="45" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">J3</text>

  <!-- USB-to-UART (bottom left) -->
  <rect x="120" y="610" width="140" height="30" rx="4" fill="url(#usb)" stroke="#444" stroke-width="1"/>
  <text x="190" y="629" text-anchor="middle" fill="#fff" font-size="9">USB-to-UART (Micro-USB)</text>

  <!-- USB OTG (bottom right) -->
  <rect x="660" y="610" width="140" height="30" rx="4" fill="url(#usb)" stroke="#444" stroke-width="1"/>
  <text x="730" y="629" text-anchor="middle" fill="#fff" font-size="9">USB OTG (USB-C)</text>

  <!-- J1 pin positions (20px spacing):
       Pin 5 GPIO5  → y=103
       Pin 7 GPIO7  → y=143
       Pin 8 GPIO15 → y=163
       Pin 9 GPIO16 → y=183
       Pin10 GPIO17 → y=203
       Pin11 GPIO18 → y=223 -->

  <!-- J1 Pin 5: GPIO5 / BOOT0 -->
  <circle cx="76" cy="103" r="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <!-- J1 Pin 7: GPIO7 / NRST -->
  <circle cx="76" cy="143" r="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <!-- J1 Pin 8: GPIO15 / TERMINAL_RX -->
  <circle cx="76" cy="163" r="10" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <!-- J1 Pin 9: GPIO16 / TERMINAL_TX -->
  <circle cx="76" cy="183" r="10" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <!-- J1 Pin 10: GPIO17 / ROUTER_TX -->
  <circle cx="76" cy="203" r="10" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <!-- J1 Pin 11: GPIO18 / ROUTER_RX -->
  <circle cx="76" cy="223" r="10" fill="#3498db" stroke="#2980b9" stroke-width="2"/>

  <!-- J3 Pin 2: GPIO43 / U0TXD -->
  <circle cx="844" cy="83" r="10" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <!-- J3 Pin 3: GPIO44 / U0RXD -->
  <circle cx="844" cy="103" r="10" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <!-- J3 Pin 16: GPIO48 / RGB LED -->
  <circle cx="844" cy="253" r="10" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/>

  <!-- === GPIO5 BOOT0 (STM32 only) === -->
  <line x1="76" y1="103" x2="220" y2="60" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="130" y="46" width="160" height="18" rx="3" fill="#e74c3c"/>
  <text x="210" y="59" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO5 · BOOT0 (STM32 only)</text>
  <line x1="290" y1="55" x2="520" y2="55" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="525,55 515,50 515,60" fill="#e74c3c"/>
  <text x="410" y="48" text-anchor="middle" fill="#e74c3c" font-size="9">MCU BOOT0 (STM32 OTA)</text>

  <!-- === GPIO7 NRST (STM32 only) === -->
  <line x1="76" y1="143" x2="220" y2="85" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="130" y="73" width="160" height="18" rx="3" fill="#e74c3c"/>
  <text x="210" y="86" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO7 · NRST (STM32 only)</text>
  <line x1="290" y1="82" x2="520" y2="82" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="525,82 515,77 515,87" fill="#e74c3c"/>
  <text x="410" y="75" text-anchor="middle" fill="#e74c3c" font-size="9">MCU NRST (STM32 OTA)</text>

  <!-- === GPIO15 TERMINAL_RX + GPIO16 TERMINAL_TX (Serial1) === -->
  <!-- Shared port: Terminal + OTA flash (when MOWER_TERMINAL defined) -->
  <rect x="80" y="353" width="175" height="30" rx="3" fill="#2ecc71"/>
  <text x="168" y="368" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO15 · TERMINAL_RX</text>
  <text x="168" y="380" text-anchor="middle" fill="#fff" font-size="9">GPIO16 · TERMINAL_TX</text>

  <!-- Line from GPIO15 (y=163) to annotation box -->
  <line x1="86" y1="163" x2="130" y2="360" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Line from GPIO16 (y=183) to annotation box -->
  <line x1="86" y1="183" x2="130" y2="368" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Arrow from Serial1 annotation to mower controller -->
  <line x1="255" y1="368" x2="480" y2="500" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="485,500 475,495 475,505" fill="#2ecc71"/>
  <text x="370" y="475" text-anchor="middle" fill="#2ecc71" font-size="9">Serial1 (Terminal + STM32 OTA flash)</text>

  <!-- === GPIO17 ROUTER_TX (Serial2) === -->
  <line x1="86" y1="203" x2="200" y2="310" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="120" y="298" width="190" height="18" rx="3" fill="#3498db"/>
  <text x="215" y="311" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO17 · ROUTER_TX (Serial2)</text>
  <line x1="310" y1="307" x2="520" y2="420" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="525,420 515,415 515,425" fill="#3498db"/>
  <text x="420" y="368" text-anchor="middle" fill="#3498db" font-size="9">→ Mower controller UART RX (AT cmds)</text>

  <!-- === GPIO18 ROUTER_RX (Serial2) === -->
  <line x1="86" y1="223" x2="200" y2="335" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="120" y="323" width="190" height="18" rx="3" fill="#3498db"/>
  <text x="215" y="336" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO18 · ROUTER_RX (Serial2)</text>
  <path d="M 310 332 L 340 440 L 520 440" stroke="#3498db" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="525,440 515,435 515,445" fill="#3498db"/>
  <text x="420" y="455" text-anchor="middle" fill="#3498db" font-size="9">← Mower controller UART TX (AT cmds)</text>

  <!-- === GPIO43 U0TXD === -->
  <line x1="844" y1="83" x2="700" y2="60" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="590" y="46" width="160" height="18" rx="3" fill="#f39c12"/>
  <text x="670" y="59" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO43 · U0TXD (Console)</text>

  <!-- === GPIO44 U0RXD === -->
  <line x1="844" y1="103" x2="700" y2="85" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="590" y="73" width="160" height="18" rx="3" fill="#f39c12"/>
  <text x="670" y="86" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO44 · U0RXD (Console)</text>

  <!-- === GPIO48 RGB LED === -->
  <line x1="844" y1="253" x2="700" y2="310" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="590" y="300" width="160" height="18" rx="3" fill="#9b59b6"/>
  <text x="670" y="313" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GPIO48 · RGB LED (unused)</text>

  <!-- Console USB -->
  <line x1="590" y1="625" x2="310" y2="625" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="305,625 315,620 315,630" fill="#f39c12"/>
  <text x="450" y="618" text-anchor="middle" fill="#f39c12" font-size="9">↔ Debug console (115200 Bd)</text>

  <!-- info box -->
  <rect x="320" y="270" width="280" height="40" rx="4" fill="rgba(0,0,0,0.25)" stroke="#3a8a3a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="460" y="287" text-anchor="middle" fill="#aaa" font-size="9">Reboot uses AT+Y via Serial2</text>
  <text x="460" y="301" text-anchor="middle" fill="#aaa" font-size="9">GPIO 5/7 for OTA flashing only</text>

  <!-- Legend -->
  <rect x="80" y="530" width="760" height="60" rx="4" fill="rgba(0,0,0,0.3)" stroke="#3a8a3a" stroke-width="1"/>
  <text x="100" y="550" fill="#ccc" font-size="11" font-weight="bold">Legend:</text>

  <rect x="100" y="560" width="14" height="14" rx="3" fill="#e74c3c"/>
  <text x="120" y="572" fill="#ccc" font-size="10">MCU OTA control (STM32: BOOT0 + NRST)</text>

  <rect x="360" y="560" width="14" height="14" rx="3" fill="#3498db"/>
  <text x="380" y="572" fill="#ccc" font-size="10">Mower controller data (Serial2 · 115200 Bd)</text>

  <rect x="100" y="580" width="14" height="14" rx="3" fill="#f39c12"/>
  <text x="120" y="592" fill="#ccc" font-size="10">USB debug console</text>

  <rect x="360" y="580" width="14" height="14" rx="3" fill="#2ecc71"/>
  <text x="380" y="592" fill="#ccc" font-size="10">Mower terminal / OTA flash (Serial1)</text>

  <rect x="680" y="580" width="14" height="14" rx="3" fill="#9b59b6"/>
  <text x="700" y="592" fill="#ccc" font-size="10">RGB LED (not driven)</text>
</svg>

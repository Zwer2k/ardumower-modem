; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-S3-N16-R8


[env:esp32]
platform = espressif32@^6.10.0
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
;board_build.partitions = min_spiffs.csv
board_build.partitions = huge_app.csv
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.f_cpu = 160000000L
build_unflags = -Werror=reorder
build_flags = 
	-Og
	-Wall -Wextra
	-Wno-unused-parameter
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
	; -D CONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
	; -D CONFIG_ASYNC_TCP_PRIORITY=10
	-D CONFIG_ASYNC_TCP_QUEUE_SIZE=128
	-D CONFIG_ASYNC_TCP_RUNNING_CORE=1
	-D CONFIG_ASYNC_TCP_STACK_SIZE=4096
;build_flags = -DENABLE_PS4_CONTROLLER
;build_flags = -DESP_MODEM_SIM
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps = 
	h2zero/NimBLE-Arduino@^1.4.3
	bblanchon/ArduinoJson@^6.21.2
	; git+https://github.com/Zwer2k/ESPAsyncWebServer.git#patch-for-new-espressif-version
	; https://github.com/timotto/AsyncTCP.git
	256dpi/MQTT@^2.5.2
	bxparks/AUnit
	gilmaimon/ArduinoWebsockets
	;https://github.com/aed3/PS4-esp32.git
	ESP32Async/AsyncTCP@3.4.1
  	ESP32Async/ESPAsyncWebServer@3.7.7
custom_sdkconfig = CONFIG_LWIP_MAX_ACTIVE_TCP=32


[env:esp32-S3-N16-R8]
platform = espressif32@^6.10.0
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino ;, espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
board_build.extra_flags = -DBOARD_HAS_PSRAM
build_unflags = -Werror=reorder
build_flags = 
	-Og
	-Wall -Wextra
	-Wno-unused-parameter
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
	; -D CONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
	; -D CONFIG_ASYNC_TCP_PRIORITY=10
	-D CONFIG_ASYNC_TCP_QUEUE_SIZE=128
	-D CONFIG_ASYNC_TCP_RUNNING_CORE=1
	-D CONFIG_ASYNC_TCP_STACK_SIZE=16384
	-D ROUTER_TX_PIN=17
	-D ROUTER_RX_PIN=18
	; -D ENABLE_PS4_CONTROLLER
	;-D ESP_MODEM_SIM
	;-D ESP_MODEM_TEST
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps = 
	h2zero/NimBLE-Arduino@^1.4.3
	bblanchon/ArduinoJson@^6.21.2
	; git+https://github.com/Zwer2k/ESPAsyncWebServer.git#patch-for-new-espressif-version
	; https://github.com/timotto/AsyncTCP.git
	256dpi/MQTT@^2.5.2
	bxparks/AUnit
	gilmaimon/ArduinoWebsockets
	;https://github.com/aed3/PS4-esp32.git
	ESP32Async/AsyncTCP@3.4.1
  	ESP32Async/ESPAsyncWebServer@3.7.7
custom_sdkconfig = CONFIG_LWIP_MAX_ACTIVE_TCP=32